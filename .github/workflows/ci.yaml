name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    uses: ./.github/workflows/go.yaml

  helm:
    uses: ./.github/workflows/helm.yaml
    permissions:
      contents: read
      packages: write

  shellcheck:
    uses: ./.github/workflows/shellcheck.yaml

  openvox-operator:
    needs: go
    uses: ./.github/workflows/container-build.yaml
    permissions:
      contents: read
      packages: write
    with:
      image_name: openvox-operator
      dockerfile: images/openvox-operator/Containerfile
      context: '.'

  openvox-server:
    needs: shellcheck
    uses: ./.github/workflows/container-build.yaml
    permissions:
      contents: read
      packages: write
    with:
      image_name: openvox-server
      dockerfile: images/openvox-server/Containerfile
      context: images/openvox-server
