name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CHANGELOG*'
      - '.github/*.md'
      - 'mkdocs.yml'
      - 'renovate.json'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CHANGELOG*'
      - '.github/*.md'
      - 'mkdocs.yml'
      - 'renovate.json'

jobs:
  unicode:
    uses: ./.github/workflows/_unicode-lint.yaml

  go:
    uses: ./.github/workflows/_go.yaml

  helm:
    uses: ./.github/workflows/_helm.yaml

  shellcheck:
    uses: ./.github/workflows/_shellcheck.yaml

  openvox-operator:
    needs: go
    uses: ./.github/workflows/_container-build.yaml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      image_name: openvox-operator
      dockerfile: images/openvox-operator/Containerfile
      context: '.'
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
      image_tag: develop

  openvox-server:
    needs: shellcheck
    uses: ./.github/workflows/_container-build.yaml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      image_name: openvox-server
      dockerfile: images/openvox-server/Containerfile
      context: '.'
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
      image_tag: develop

  openvox-db:
    needs: shellcheck
    uses: ./.github/workflows/_container-build.yaml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      image_name: openvox-db
      dockerfile: images/openvox-db/Containerfile
      context: '.'
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
      image_tag: develop

  openvox-e2e-code:
    needs: shellcheck
    uses: ./.github/workflows/_container-build.yaml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      image_name: openvox-e2e-code
      dockerfile: images/openvox-e2e-code/Containerfile
      context: '.'
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
      image_tag: develop
      sign: false

  openvox-agent:
    needs: shellcheck
    uses: ./.github/workflows/_container-build.yaml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      image_name: openvox-agent
      dockerfile: images/openvox-agent/Containerfile
      context: 'images/openvox-agent'
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
      image_tag: develop
      sign: false

  openvox-mock:
    needs: shellcheck
    uses: ./.github/workflows/_container-build.yaml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      image_name: openvox-mock
      dockerfile: images/openvox-mock/Containerfile
      context: '.'
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
      image_tag: develop
      sign: false
