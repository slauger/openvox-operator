name: Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (only list, do not delete)'
        required: false
        type: boolean
        default: true

jobs:
  packages:
    name: packages (${{ matrix.package }})
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        package:
          - openvox-operator
          - openvox-server
          - openvox-codedeploy
          - charts/openvox-operator
          - charts/openvox-stack
    steps:
      - name: Delete untagged package versions
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE: ${{ matrix.package }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ENCODED=$(echo "$PACKAGE" | sed 's|/|%2F|g')
          API_PATH="repos/${{ github.repository }}/packages/container/${ENCODED}/versions"

          echo "=== ${PACKAGE} ==="

          VERSIONS=$(gh api "$API_PATH" --paginate -q '.[] | select(.metadata.container.tags | length == 0) | .id') || true

          if [ -z "$VERSIONS" ]; then
            echo "No untagged versions found."
            exit 0
          fi

          COUNT=$(echo "$VERSIONS" | wc -l | tr -d ' ')
          echo "Found ${COUNT} untagged version(s)."

          for ID in $VERSIONS; do
            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would delete version $ID"
            else
              gh api --method DELETE "$API_PATH/$ID" --silent && echo "Deleted version $ID" || echo "Failed to delete version $ID"
            fi
          done

  deployments:
    name: deployments
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Delete old github-pages deployments
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          API_PATH="repos/${{ github.repository }}/deployments"

          # Get all deployment IDs, skip the newest one
          DEPLOYMENTS=$(gh api "$API_PATH" --paginate -q '.[].id' | tail -n +2)

          if [ -z "$DEPLOYMENTS" ]; then
            echo "No old deployments to clean up."
            exit 0
          fi

          COUNT=$(echo "$DEPLOYMENTS" | wc -l | tr -d ' ')
          echo "Found ${COUNT} old deployment(s) to remove."

          for ID in $DEPLOYMENTS; do
            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would delete deployment $ID"
            else
              # Mark as inactive first (required before deletion)
              gh api --method POST "$API_PATH/$ID/statuses" -f state=inactive --silent 2>/dev/null || true
              gh api --method DELETE "$API_PATH/$ID" --silent && echo "Deleted deployment $ID" || echo "Failed to delete deployment $ID"
            fi
          done
