name: Container Build

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Image name (without registry prefix)'
        required: true
        type: string
      dockerfile:
        description: 'Path to Containerfile'
        required: true
        type: string
      context:
        description: 'Build context path'
        required: false
        type: string
        default: '.'
      platforms:
        description: 'Target platforms (comma-separated)'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
    outputs:
      version:
        description: 'Image version tag'
        value: ${{ jobs.prepare.outputs.version }}
      image:
        description: 'Full image reference'
        value: ${{ jobs.manifest.outputs.image }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Determine version
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build platform matrix
        id: matrix
        run: |
          PLATFORMS='${{ inputs.platforms }}'
          MATRIX='{"include":['
          FIRST=true
          for PLATFORM in ${PLATFORMS//,/ }; do
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              MATRIX="${MATRIX},"
            fi
            case "${PLATFORM}" in
              linux/amd64) RUNNER="ubuntu-latest" ;;
              linux/arm64) RUNNER="ubuntu-24.04-arm" ;;
              *)           RUNNER="ubuntu-latest" ;;
            esac
            MATRIX="${MATRIX}{\"platform\":\"${PLATFORM}\",\"runner\":\"${RUNNER}\"}"
          done
          MATRIX="${MATRIX}]}"
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ inputs.dockerfile }}

  build:
    needs: [hadolint, prepare]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set platform suffix
        id: platform
        run: |
          SUFFIX="${{ matrix.platform }}"
          echo "suffix=${SUFFIX//\//-}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ needs.prepare.outputs.version }}-${{ steps.platform.outputs.suffix }}
          cache-from: type=gha,scope=${{ inputs.image_name }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image_name }}-${{ matrix.platform }}

  manifest:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.result.outputs.image }}
    permissions:
      packages: write
    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create and push manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          PLATFORMS="${{ inputs.platforms }}"

          IMAGES=""
          for PLATFORM in ${PLATFORMS//,/ }; do
            SUFFIX="${PLATFORM//\//-}"
            IMAGES="${IMAGES} ${IMAGE}:${VERSION}-${SUFFIX}"
          done
          IMAGES=$(echo ${IMAGES} | xargs)

          docker manifest create ${IMAGE}:${VERSION} ${IMAGES}
          docker manifest push ${IMAGE}:${VERSION}

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker manifest create ${IMAGE}:latest ${IMAGES}
            docker manifest push ${IMAGE}:latest
          fi

      - name: Set output
        id: result
        run: |
          echo "image=ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ needs.prepare.outputs.version }}" >> $GITHUB_OUTPUT
