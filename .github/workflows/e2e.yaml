name: E2E

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag for E2E images'
        required: false
        type: string
        default: 'develop'

jobs:
  e2e-base:
    uses: ./.github/workflows/_e2e-run.yaml
    with:
      image_tag: ${{ inputs.image_tag }}
      group: base
    secrets: inherit

  e2e-enc:
    needs: [e2e-base]
    uses: ./.github/workflows/_e2e-run.yaml
    with:
      image_tag: ${{ inputs.image_tag }}
      group: enc
    secrets: inherit

  e2e-gateway:
    needs: [e2e-enc]
    uses: ./.github/workflows/_e2e-run.yaml
    with:
      image_tag: ${{ inputs.image_tag }}
      group: gateway
    secrets: inherit

  e2e-webhooks-cm:
    needs: [e2e-gateway]
    uses: ./.github/workflows/_e2e-run.yaml
    with:
      image_tag: ${{ inputs.image_tag }}
      group: webhooks-cm
    secrets: inherit
