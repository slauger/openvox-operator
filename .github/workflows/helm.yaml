name: Helm

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - openvox-operator
          - openvox-stack
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint charts/${{ matrix.chart }}

      - name: Helm template
        run: helm template test charts/${{ matrix.chart }}

  push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        chart:
          - openvox-operator
          - openvox-stack
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Login to ghcr.io
        run: echo "${{ github.token }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package charts/${{ matrix.chart }}

      - name: Push chart
        run: helm push ${{ matrix.chart }}-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
