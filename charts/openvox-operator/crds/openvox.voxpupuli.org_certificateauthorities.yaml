---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: certificateauthorities.openvox.voxpupuli.org
spec:
  group: openvox.voxpupuli.org
  names:
    kind: CertificateAuthority
    listKind: CertificateAuthorityList
    plural: certificateauthorities
    shortNames:
    - ca
    singular: certificateauthority
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.notAfter
      name: NotAfter
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          CertificateAuthority is the Schema for the certificateauthorities API.
          It manages the CA infrastructure: PVC, CA keys, CA public Secret, and signing policy.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CertificateAuthoritySpec defines the desired state of CertificateAuthority.
            properties:
              allowAuthorizationExtensions:
                default: true
                description: |-
                  AllowAuthorizationExtensions controls whether authorization extensions
                  (pp_role, pp_environment, etc.) are allowed in CSRs.
                type: boolean
              allowAutoRenewal:
                default: true
                description: AllowAutoRenewal allows agents to automatically renew
                  certificates before expiry.
                type: boolean
              allowSubjectAltNames:
                default: true
                description: AllowSubjectAltNames controls whether SANs are allowed
                  in CSRs.
                type: boolean
              autoRenewalCertTTL:
                default: 90d
                description: |-
                  AutoRenewalCertTTL is the TTL threshold for automatic certificate renewal.
                  Uses duration format: "90d", "30d", "2160h".
                type: string
              crlRefreshInterval:
                default: 5m
                description: |-
                  CRLRefreshInterval defines how often the operator fetches the CRL from the CA
                  and updates the CRL Secret. Only applies to non-CA servers.
                  Uses Go duration format: "5m", "1h", "30s".
                type: string
              enableInfraCRL:
                default: true
                description: EnableInfraCRL enables infrastructure CRL for compile
                  server revocation.
                type: boolean
              external:
                description: |-
                  External configures an external CA running outside the cluster.
                  When set, the operator skips PVC/Job-based CA setup and delegates
                  CSR signing and CRL fetching to the external CA URL.
                  Mutually exclusive with custom storage settings.
                properties:
                  caSecretRef:
                    description: |-
                      CASecretRef references a Secret containing the CA certificate in key "ca_crt.pem".
                      Used to verify the external CA's TLS certificate.
                    type: string
                  insecureSkipVerify:
                    description: |-
                      InsecureSkipVerify disables TLS certificate verification for the external CA.
                      Only use this for testing or when the CA uses a self-signed certificate
                      and no CASecretRef is provided.
                    type: boolean
                  tlsSecretRef:
                    description: |-
                      TLSSecretRef references a Secret containing "tls.crt" and "tls.key" for mTLS
                      client authentication against the external CA.
                    type: string
                  url:
                    description: URL is the base URL of the external Puppet/OpenVox
                      CA (e.g. "https://puppet-ca.example.com:8140").
                    pattern: ^https?://
                    type: string
                required:
                - url
                type: object
              intermediateCA:
                description: IntermediateCA configures an intermediate CA setup.
                properties:
                  enabled:
                    default: false
                    description: Enabled activates intermediate CA mode.
                    type: boolean
                  secretName:
                    description: SecretName is the name of the Secret containing ca.pem,
                      key.pem, crl.pem.
                    type: string
                required:
                - enabled
                type: object
              resources:
                description: |-
                  Resources defines the compute resources for the CA setup Job.
                  If not specified, defaults are applied (requests: 200m CPU, 768Mi memory; limits: 1 CPU, 1Gi memory).
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              storage:
                description: Storage defines the PVC settings for CA data.
                properties:
                  size:
                    default: 1Gi
                    description: Size is the requested storage size.
                    type: string
                  storageClass:
                    description: StorageClass is the storage class name. Empty means
                      default.
                    type: string
                type: object
              ttl:
                default: 5y
                description: |-
                  TTL is the CA certificate TTL as a duration string.
                  Supported units: s (seconds), m (minutes), h (hours), d (days), y (years).
                  Examples: "5y", "365d", "8760h", "157680000s"
                  Plain numbers are interpreted as seconds for backwards compatibility.
                type: string
            type: object
            x-kubernetes-validations:
            - message: external and custom storage are mutually exclusive
              rule: '!(has(self.external) && has(self.storage) && self.storage.size
                != ” && self.storage.size != ''1Gi'')'
          status:
            description: CertificateAuthorityStatus defines the observed state of
              CertificateAuthority.
            properties:
              caSecretName:
                description: |-
                  CASecretName is the name of the Secret containing ca_crt.pem (public CA certificate).
                  The CA private key is stored separately in {name}-ca-key, and CRLs in {name}-ca-crl.
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              notAfter:
                description: NotAfter is the expiration time of the CA certificate.
                format: date-time
                type: string
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Pending
                - Initializing
                - Ready
                - External
                - Error
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
