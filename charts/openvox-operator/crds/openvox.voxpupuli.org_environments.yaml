---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: environments.openvox.voxpupuli.org
spec:
  group: openvox.voxpupuli.org
  names:
    kind: Environment
    listKind: EnvironmentList
    plural: environments
    shortNames:
    - env
    singular: environment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.caReady
      name: CA Ready
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Environment is the Schema for the environments API.
          It manages shared configuration, CA lifecycle, and PuppetDB connection.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EnvironmentSpec defines the desired state of Environment.
            properties:
              ca:
                description: CA defines the Certificate Authority configuration.
                properties:
                  allowSubjectAltNames:
                    default: true
                    description: AllowSubjectAltNames controls whether SANs are allowed
                      in CSRs.
                    type: boolean
                  autosign:
                    default: "true"
                    description: |-
                      Autosign controls certificate autosigning.
                      Can be "true", "false", or a path to an autosign script.
                    type: string
                  certname:
                    default: puppet
                    description: Certname is the CA server's certificate name.
                    type: string
                  dnsAltNames:
                    description: DNSAltNames is a list of DNS alternative names for
                      the CA certificate.
                    items:
                      type: string
                    type: array
                  intermediateCA:
                    description: IntermediateCA configures an intermediate CA setup.
                    properties:
                      enabled:
                        default: false
                        description: Enabled activates intermediate CA mode.
                        type: boolean
                      secretName:
                        description: SecretName is the name of the Secret containing
                          ca.pem, key.pem, crl.pem.
                        type: string
                    required:
                    - enabled
                    type: object
                  storage:
                    description: Storage defines the PVC settings for CA data.
                    properties:
                      size:
                        default: 1Gi
                        description: Size is the requested storage size.
                        type: string
                      storageClass:
                        description: StorageClass is the storage class name. Empty
                          means default.
                        type: string
                    type: object
                  ttl:
                    default: 157680000
                    description: TTL is the CA certificate TTL in seconds.
                    format: int64
                    type: integer
                type: object
              code:
                description: |-
                  Code defines the PVC for Puppet code (environments directory).
                  All Servers in this Environment mount this PVC by default.
                properties:
                  claimName:
                    description: ClaimName is the name of an existing PVC containing
                      Puppet code.
                    type: string
                required:
                - claimName
                type: object
              image:
                description: Image defines the default container image for all Servers
                  in this Environment.
                properties:
                  pullPolicy:
                    default: IfNotPresent
                    description: PullPolicy defines the image pull policy.
                    type: string
                  pullSecrets:
                    description: PullSecrets is a list of image pull secrets.
                    items:
                      description: |-
                        LocalObjectReference contains enough information to let you locate the
                        referenced object inside the same namespace.
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    type: array
                  repository:
                    default: ghcr.io/slauger/openvox-server
                    description: Repository is the container image repository.
                    type: string
                  tag:
                    default: latest
                    description: Tag is the container image tag.
                    type: string
                type: object
              puppet:
                description: Puppet defines shared puppet.conf settings.
                properties:
                  environmentPath:
                    default: /etc/puppetlabs/code/environments
                    description: EnvironmentPath is the path to puppet environments.
                    type: string
                  environmentTimeout:
                    default: unlimited
                    description: EnvironmentTimeout controls how long puppet caches
                      environments.
                    type: string
                  extraConfig:
                    additionalProperties:
                      type: string
                    description: ExtraConfig is a map of additional puppet.conf entries.
                    type: object
                  hieraConfig:
                    default: $confdir/hiera.yaml
                    description: HieraConfig is the path to the hiera configuration.
                    type: string
                  reports:
                    default: puppetdb
                    description: Reports defines which report processors to use.
                    type: string
                  storeBackend:
                    default: puppetdb
                    description: StoreBackend is the storeconfigs backend.
                    type: string
                  storeconfigs:
                    default: true
                    description: Storeconfigs enables storeconfigs.
                    type: boolean
                type: object
              puppetdb:
                description: PuppetDB defines the PuppetDB connection settings.
                properties:
                  serverUrls:
                    description: ServerURLs is a list of PuppetDB server URLs.
                    items:
                      type: string
                    type: array
                type: object
            required:
            - image
            type: object
          status:
            description: EnvironmentStatus defines the observed state of Environment.
            properties:
              caReady:
                description: CAReady indicates whether the CA is initialized.
                type: boolean
              caSecretName:
                description: CASecretName is the name of the CA marker Secret.
                type: string
              caServiceName:
                description: CAServiceName is the name of the CA Service.
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Pending
                - CASetup
                - Running
                - Error
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
