    controller-gen.kubebuilder.io/version: v0.20.1
  name: reportprocessors.openvox.voxpupuli.org
spec:
  group: openvox.voxpupuli.org
  names:
    kind: ReportProcessor
    listKind: ReportProcessorList
    plural: reportprocessors
    shortNames:
    - rp
    singular: reportprocessor
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.url
      name: URL
      type: string
    - jsonPath: .spec.processor
      name: Processor
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ReportProcessor is the Schema for the reportprocessors API.
          It defines a report forwarding endpoint for Puppet Server.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ReportProcessorSpec defines the desired state of ReportProcessor.
            properties:
              auth:
                description: Auth defines the authentication method. If omitted, no
                  authentication is used.
                properties:
                  basic:
                    description: Basic uses HTTP Basic Authentication.
                    properties:
                      secretRef:
                        description: SecretRef references the Secret containing username
                          and password.
                        properties:
                          name:
                            description: Name is the name of the Secret.
                            type: string
                          passwordKey:
                            default: password
                            description: PasswordKey is the key within the Secret
                              containing the password.
                            type: string
                          usernameKey:
                            default: username
                            description: UsernameKey is the key within the Secret
                              containing the username.
                            type: string
                        required:
                        - name
                        - passwordKey
                        - usernameKey
                        type: object
                    required:
                    - secretRef
                    type: object
                  bearer:
                    description: Bearer sends a Bearer token via the Authorization
                      header.
                    properties:
                      secretKeyRef:
                        description: SecretKeyRef selects a key from a Secret.
                        properties:
                          key:
                            description: Key is the key within the Secret.
                            type: string
                          name:
                            description: Name is the name of the Secret.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    required:
                    - secretKeyRef
                    type: object
                  mtls:
                    description: MTLS uses the Puppet SSL certificates for mutual
                      TLS authentication.
                    type: boolean
                  token:
                    description: Token sends a token via a custom HTTP header.
                    properties:
                      header:
                        description: Header is the HTTP header name (e.g. X-Authentication).
                        type: string
                      secretKeyRef:
                        description: SecretKeyRef references the Secret key containing
                          the token value.
                        properties:
                          key:
                            description: Key is the key within the Secret.
                            type: string
                          name:
                            description: Name is the name of the Secret.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    required:
                    - header
                    - secretKeyRef
                    type: object
                type: object
                x-kubernetes-validations:
                - message: at most one auth method may be set
                  rule: '(self.mtls ? 1 : 0) + (has(self.token) ? 1 : 0) + (has(self.bearer)
                    ? 1 : 0) + (has(self.basic) ? 1 : 0) <= 1'
              configRef:
                description: ConfigRef references the Config this ReportProcessor
                  belongs to.
                type: string
              headers:
                description: Headers defines custom HTTP headers to send with each
                  request.
                items:
                  description: |-
                    HTTPHeader defines a custom HTTP header.
                    Either value or valueFrom may be set, not both.
                  properties:
                    name:
                      description: Name is the HTTP header name.
                      type: string
                    value:
                      description: Value is a literal header value.
                      type: string
                    valueFrom:
                      description: ValueFrom references a Secret or ConfigMap for
                        the header value.
                      properties:
                        configMapKeyRef:
                          description: ConfigMapKeyRef references a key in a ConfigMap.
                          properties:
                            key:
                              description: Key is the key within the ConfigMap.
                              type: string
                            name:
                              description: Name is the name of the ConfigMap.
                              type: string
                          required:
                          - key
                          - name
                          type: object
                        secretKeyRef:
                          description: SecretKeyRef references a key in a Secret.
                          properties:
                            key:
                              description: Key is the key within the Secret.
                              type: string
                            name:
                              description: Name is the name of the Secret.
                              type: string
                          required:
                          - key
                          - name
                          type: object
                      type: object
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: value and valueFrom are mutually exclusive
                    rule: '!(has(self.value) && size(self.value) > 0 && has(self.valueFrom))'
                type: array
              processor:
                description: |-
                  Processor is the report processor type.
                  Use "puppetdb" for PuppetDB Wire Format v8 transformation.
                  Empty string means generic (forward report JSON as-is).
                enum:
                - puppetdb
                - ""
                type: string
              timeoutSeconds:
                default: 30
                description: TimeoutSeconds is the HTTP request timeout.
                format: int32
                type: integer
              url:
                description: URL is the endpoint to forward reports to.
                type: string
            required:
            - configRef
            - url
            type: object
          status:
            description: ReportProcessorStatus defines the observed state of ReportProcessor.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Active
                - Error
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
