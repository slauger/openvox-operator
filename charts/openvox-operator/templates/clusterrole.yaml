apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openvox-operator.fullname" . }}
  labels:
    {{- include "openvox-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["openvox.voxpupuli.org"]
    resources: ["configs", "pools", "servers", "certificateauthorities", "certificates", "signingpolicies", "nodeclassifiers", "reportprocessors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["openvox.voxpupuli.org"]
    resources: ["configs/status", "pools/status", "servers/status", "certificateauthorities/status", "certificates/status", "signingpolicies/status", "nodeclassifiers/status", "reportprocessors/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["openvox.voxpupuli.org"]
    resources: ["configs/finalizers", "pools/finalizers", "servers/finalizers", "certificateauthorities/finalizers", "certificates/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["tlsroutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["", "events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
