{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "openvox-operator.fullname" . }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "openvox-operator.fullname" . }}-webhook
  {{- end }}
  labels:
    {{- include "openvox-operator.labels" . | nindent 4 }}
webhooks:
  {{- $fullname := include "openvox-operator.fullname" . }}
  {{- $ns := .Release.Namespace }}
  {{- $certManagerEnabled := .Values.webhook.certManager.enabled }}
  {{- $caBundle := .Values.webhook.tls.caBundle }}
  {{- range $kind := list "server" "certificate" "config" "signingpolicy" "reportprocessor" "nodeclassifier" "certificateauthority" "pool" "database" }}
  - name: v{{ $kind }}.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      {{- if and (not $certManagerEnabled) $caBundle }}
      caBundle: {{ $caBundle }}
      {{- end }}
      service:
        name: {{ $fullname }}-webhook
        namespace: {{ $ns }}
        path: /validate-openvox-voxpupuli-org-v1alpha1-{{ $kind }}
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - openvox.voxpupuli.org
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          {{- if eq $kind "server" }}
          - servers
          {{- else if eq $kind "certificate" }}
          - certificates
          {{- else if eq $kind "config" }}
          - configs
          {{- else if eq $kind "signingpolicy" }}
          - signingpolicies
          {{- else if eq $kind "reportprocessor" }}
          - reportprocessors
          {{- else if eq $kind "nodeclassifier" }}
          - nodeclassifiers
          {{- else if eq $kind "certificateauthority" }}
          - certificateauthorities
          {{- else if eq $kind "pool" }}
          - pools
          {{- else if eq $kind "database" }}
          - databases
          {{- end }}
  {{- end }}
{{- end }}
