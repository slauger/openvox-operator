suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should render a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-openvox-operator

  - it: should not render when create is false
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom name
    set:
      serviceAccount:
        create: true
        name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should add annotations
    set:
      serviceAccount:
        create: true
        annotations:
          my-annotation: my-value
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            my-annotation: my-value
