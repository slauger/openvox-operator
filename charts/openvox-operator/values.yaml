replicaCount: 1

image:
  repository: ghcr.io/slauger/openvox-operator
  tag: latest
  # digest: sha256:...  # Set to use digest instead of tag
  pullPolicy: Always

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

leaderElect: true

# Operator scope configuration
# mode: "cluster" (default) watches all namespaces with ClusterRole/ClusterRoleBinding
# mode: "namespace" restricts the operator to a single namespace with Role/RoleBinding
scope:
  mode: cluster
  # watchNamespace: defaults to .Release.Namespace when mode is "namespace"
  watchNamespace: ""

gatewayAPI:
  enabled: true  # set to false to disable TLSRoute support

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Admission webhook configuration
webhook:
  enabled: false
  port: 9443
  certManager:
    enabled: true        # set to false to skip cert-manager resources
    duration: 8760h      # 1 year
    renewBefore: 720h    # 30 days
  tls:
    certSecret: ""       # name of an existing TLS Secret (tls.crt, tls.key, ca.crt)
    caBundle: ""         # base64-encoded CA certificate for webhook config

nodeSelector: {}
tolerations: []
affinity: {}
