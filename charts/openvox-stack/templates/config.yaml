apiVersion: openvox.voxpupuli.org/v1alpha1
kind: Config
metadata:
  name: {{ include "openvox-stack.configName" . }}
spec:
  authorityRef: {{ include "openvox-stack.caName" . }}
  {{- if .Values.nodeClassifier.enabled }}
  nodeClassifierRef: {{ include "openvox-stack.nodeClassifierName" . }}
  {{- end }}
  image:
    repository: {{ .Values.config.image.repository }}
    tag: {{ .Values.config.image.tag | quote }}
    pullPolicy: {{ .Values.config.image.pullPolicy }}
  {{- if .Values.config.puppetdb.serverUrls }}
  puppetdb:
    serverUrls:
      {{- toYaml .Values.config.puppetdb.serverUrls | nindent 6 }}
  {{- else if and .Values.database.enabled .Values.database.name }}
  databaseRef: {{ .Values.database.name }}
  {{- end }}
  {{- if .Values.config.readOnlyRootFilesystem }}
  readOnlyRootFilesystem: true
  {{- end }}
  puppet:
    environmentTimeout: {{ .Values.config.puppet.environmentTimeout }}
    storeconfigs: {{ ternary true .Values.config.puppet.storeconfigs .Values.database.enabled }}
    reports: {{ .Values.config.puppet.reports }}
  {{- with .Values.config.code }}
  {{- if or .image .claimName }}
  code:
    {{- with .image }}
    image: {{ . }}
    {{- end }}
    {{- with .imagePullPolicy }}
    imagePullPolicy: {{ . }}
    {{- end }}
    {{- with .imagePullSecret }}
    imagePullSecret: {{ . }}
    {{- end }}
    {{- with .claimName }}
    claimName: {{ . }}
    {{- end }}
  {{- end }}
  {{- end }}
