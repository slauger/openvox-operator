suite: Config
templates:
  - templates/config.yaml
tests:
  - it: should render a Config with default values
    asserts:
      - isKind:
          of: Config
      - isAPIVersion:
          of: openvox.voxpupuli.org/v1alpha1
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.authorityRef
          value: RELEASE-NAME-ca
      - equal:
          path: spec.image.repository
          value: ghcr.io/slauger/openvox-server

  - it: should set readOnlyRootFilesystem when true
    set:
      config:
        readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.readOnlyRootFilesystem
          value: true

  - it: should not set readOnlyRootFilesystem when false (default)
    asserts:
      - isNull:
          path: spec.readOnlyRootFilesystem

  - it: should use databaseRef when database is enabled and no serverUrls
    set:
      database:
        enabled: true
        name: my-puppetdb
    asserts:
      - equal:
          path: spec.databaseRef
          value: my-puppetdb
      - isNull:
          path: spec.puppetdb

  - it: should use puppetdb.serverUrls when set explicitly
    set:
      config:
        puppetdb:
          serverUrls:
            - https://puppetdb:8081
    asserts:
      - equal:
          path: spec.puppetdb.serverUrls[0]
          value: https://puppetdb:8081
      - isNull:
          path: spec.databaseRef

  - it: should prefer puppetdb.serverUrls over databaseRef
    set:
      database:
        enabled: true
        name: my-puppetdb
      config:
        puppetdb:
          serverUrls:
            - https://puppetdb:8081
    asserts:
      - isNotEmpty:
          path: spec.puppetdb.serverUrls
      - isNull:
          path: spec.databaseRef

  - it: should force storeconfigs true when database is enabled
    set:
      database:
        enabled: true
        name: my-puppetdb
      config:
        puppet:
          storeconfigs: false
    asserts:
      - equal:
          path: spec.puppet.storeconfigs
          value: true

  - it: should keep storeconfigs false when database is disabled
    asserts:
      - equal:
          path: spec.puppet.storeconfigs
          value: false

  - it: should include nodeClassifierRef when nodeClassifier is enabled
    set:
      nodeClassifier:
        enabled: true
    asserts:
      - equal:
          path: spec.nodeClassifierRef
          value: RELEASE-NAME-enc

  - it: should not include nodeClassifierRef when nodeClassifier is disabled
    asserts:
      - isNull:
          path: spec.nodeClassifierRef

  - it: should render code section when code image is set
    set:
      config:
        code:
          image: ghcr.io/slauger/openvox-e2e-code:latest
    asserts:
      - equal:
          path: spec.code.image
          value: ghcr.io/slauger/openvox-e2e-code:latest

  - it: should not render code section when image and claimName are empty
    asserts:
      - isNull:
          path: spec.code

  - it: should not render optional fields by default
    asserts:
      - isNull:
          path: spec.image.pullSecrets
      - isNull:
          path: spec.puppet.environmentPath
      - isNull:
          path: spec.puppet.hieraConfig
      - isNull:
          path: spec.puppet.storeBackend
      - isNull:
          path: spec.puppet.extraConfig
      - isNull:
          path: spec.puppetserver
      - isNull:
          path: spec.logging
      - isNull:
          path: spec.metrics

  - it: should propagate image pullSecrets
    set:
      config:
        image:
          pullSecrets:
            - name: my-secret
    asserts:
      - equal:
          path: spec.image.pullSecrets[0].name
          value: my-secret

  - it: should propagate puppet environmentPath
    set:
      config:
        puppet:
          environmentPath: /custom/environments
    asserts:
      - equal:
          path: spec.puppet.environmentPath
          value: /custom/environments

  - it: should propagate puppet hieraConfig
    set:
      config:
        puppet:
          hieraConfig: /etc/puppetlabs/puppet/hiera.yaml
    asserts:
      - equal:
          path: spec.puppet.hieraConfig
          value: /etc/puppetlabs/puppet/hiera.yaml

  - it: should propagate puppet storeBackend
    set:
      config:
        puppet:
          storeBackend: puppetdb
    asserts:
      - equal:
          path: spec.puppet.storeBackend
          value: puppetdb

  - it: should propagate puppet extraConfig sections
    set:
      config:
        puppet:
          extraConfig:
            main:
              environment: staging
            server:
              strict_variables: "true"
            agent:
              noop: "true"
    asserts:
      - equal:
          path: spec.puppet.extraConfig.main.environment
          value: staging
      - equal:
          path: spec.puppet.extraConfig.server.strict_variables
          value: "true"
      - equal:
          path: spec.puppet.extraConfig.agent.noop
          value: "true"

  - it: should propagate puppetserver settings
    set:
      config:
        puppetserver:
          maxRequestsPerInstance: 1000
          compileMode: jit
    asserts:
      - equal:
          path: spec.puppetserver.maxRequestsPerInstance
          value: 1000
      - equal:
          path: spec.puppetserver.compileMode
          value: jit

  - it: should propagate logging settings
    set:
      config:
        logging:
          level: DEBUG
          loggers:
            mylogger: TRACE
    asserts:
      - equal:
          path: spec.logging.level
          value: DEBUG
      - equal:
          path: spec.logging.loggers.mylogger
          value: TRACE

  - it: should propagate metrics settings
    set:
      config:
        metrics:
          enabled: true
          jmx:
            enabled: true
    asserts:
      - equal:
          path: spec.metrics.enabled
          value: true
      - equal:
          path: spec.metrics.jmx.enabled
          value: true
