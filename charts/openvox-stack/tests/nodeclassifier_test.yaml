suite: NodeClassifier
templates:
  - templates/nodeclassifier.yaml
tests:
  - it: should not render when disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render NodeClassifier when enabled
    set:
      nodeClassifier:
        enabled: true
        url: https://enc.example.com
    asserts:
      - isKind:
          of: NodeClassifier
      - isAPIVersion:
          of: openvox.voxpupuli.org/v1alpha1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-enc

  - it: should propagate url, method, path, and format
    set:
      nodeClassifier:
        enabled: true
        url: https://enc.example.com
        request:
          method: POST
          path: /classify/{certname}
        response:
          format: json
    asserts:
      - equal:
          path: spec.url
          value: https://enc.example.com
      - equal:
          path: spec.request.method
          value: POST
      - equal:
          path: spec.request.path
          value: /classify/{certname}
      - equal:
          path: spec.response.format
          value: json

  - it: should set timeoutSeconds
    set:
      nodeClassifier:
        enabled: true
        url: https://enc.example.com
        timeoutSeconds: 30
    asserts:
      - equal:
          path: spec.timeoutSeconds
          value: 30

  - it: should enable mtls auth
    set:
      nodeClassifier:
        enabled: true
        url: https://enc.example.com
        auth:
          mtls: true
    asserts:
      - equal:
          path: spec.auth.mtls
          value: true

  - it: should enable token auth
    set:
      nodeClassifier:
        enabled: true
        url: https://enc.example.com
        auth:
          token:
            header: X-Auth-Token
            secretKeyRef:
              name: enc-secret
              key: token
    asserts:
      - equal:
          path: spec.auth.token.header
          value: X-Auth-Token
      - equal:
          path: spec.auth.token.secretKeyRef.name
          value: enc-secret

  - it: should not render auth when no auth methods are set
    set:
      nodeClassifier:
        enabled: true
        url: https://enc.example.com
        auth:
          mtls: false
    asserts:
      - isNull:
          path: spec.auth

  - it: should enable cache
    set:
      nodeClassifier:
        enabled: true
        url: https://enc.example.com
        cache:
          enabled: true
          directory: /var/cache/enc
    asserts:
      - equal:
          path: spec.cache.enabled
          value: true
      - equal:
          path: spec.cache.directory
          value: /var/cache/enc

  - it: should not render cache when disabled
    set:
      nodeClassifier:
        enabled: true
        url: https://enc.example.com
        cache:
          enabled: false
    asserts:
      - isNull:
          path: spec.cache

  - it: should use custom name
    set:
      nodeClassifier:
        enabled: true
        name: my-custom-enc
        url: https://enc.example.com
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-enc
