suite: Servers
templates:
  - templates/servers.yaml
tests:
  - it: should render 2 Servers by default
    asserts:
      - hasDocuments:
          count: 2

  - it: should render ca server with ca flag true
    documentIndex: 0
    asserts:
      - isKind:
          of: Server
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ca
      - equal:
          path: spec.ca
          value: true
      - equal:
          path: spec.server
          value: true
      - equal:
          path: spec.replicas
          value: 1

  - it: should set configRef and certificateRef
    documentIndex: 0
    asserts:
      - equal:
          path: spec.configRef
          value: RELEASE-NAME
      - equal:
          path: spec.certificateRef
          value: RELEASE-NAME-ca

  - it: should expand poolRefs to full names
    documentIndex: 0
    asserts:
      - contains:
          path: spec.poolRefs
          content: RELEASE-NAME-ca
      - contains:
          path: spec.poolRefs
          content: RELEASE-NAME-server

  - it: should render second server with ca false
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-server
      - equal:
          path: spec.ca
          value: false
      - equal:
          path: spec.replicas
          value: 2

  - it: should propagate resources
    documentIndex: 0
    asserts:
      - equal:
          path: spec.resources.requests.cpu
          value: 500m
      - equal:
          path: spec.resources.limits.memory
          value: 2Gi

  - it: should render single server
    set:
      servers:
        - name: standalone
          ca: true
          server: true
          certificate:
            certname: puppet
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-standalone
      - equal:
          path: spec.replicas
          value: 1

  - it: should not render optional fields by default
    documentIndex: 0
    asserts:
      - isNull:
          path: spec.javaArgs
      - isNull:
          path: spec.maxActiveInstances
      - isNull:
          path: spec.image
      - isNull:
          path: spec.code
      - isNull:
          path: spec.autoscaling
      - isNull:
          path: spec.pdb
      - isNull:
          path: spec.networkPolicy
      - isNull:
          path: spec.topologySpreadConstraints
      - isNull:
          path: spec.affinity

  - it: should propagate javaArgs
    set:
      servers:
        - name: test
          certificate:
            certname: puppet
          javaArgs: "-Xms512m -Xmx1024m"
    asserts:
      - equal:
          path: spec.javaArgs
          value: "-Xms512m -Xmx1024m"

  - it: should propagate maxActiveInstances
    set:
      servers:
        - name: test
          certificate:
            certname: puppet
          maxActiveInstances: 4
    asserts:
      - equal:
          path: spec.maxActiveInstances
          value: 4

  - it: should propagate image override
    set:
      servers:
        - name: test
          certificate:
            certname: puppet
          image:
            repository: custom/image
            tag: v1.0
    asserts:
      - equal:
          path: spec.image.repository
          value: custom/image
      - equal:
          path: spec.image.tag
          value: v1.0

  - it: should propagate code override
    set:
      servers:
        - name: test
          certificate:
            certname: puppet
          code:
            image: ghcr.io/example/code:latest
    asserts:
      - equal:
          path: spec.code.image
          value: ghcr.io/example/code:latest

  - it: should propagate autoscaling
    set:
      servers:
        - name: test
          certificate:
            certname: puppet
          autoscaling:
            minReplicas: 2
            maxReplicas: 5
            targetCPUUtilizationPercentage: 80
    asserts:
      - equal:
          path: spec.autoscaling.minReplicas
          value: 2
      - equal:
          path: spec.autoscaling.maxReplicas
          value: 5

  - it: should propagate pdb
    set:
      servers:
        - name: test
          certificate:
            certname: puppet
          pdb:
            minAvailable: 1
    asserts:
      - equal:
          path: spec.pdb.minAvailable
          value: 1

  - it: should propagate networkPolicy
    set:
      servers:
        - name: test
          certificate:
            certname: puppet
          networkPolicy:
            enabled: true
    asserts:
      - equal:
          path: spec.networkPolicy.enabled
          value: true

  - it: should propagate topologySpreadConstraints
    set:
      servers:
        - name: test
          certificate:
            certname: puppet
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
    asserts:
      - equal:
          path: spec.topologySpreadConstraints[0].maxSkew
          value: 1
      - equal:
          path: spec.topologySpreadConstraints[0].topologyKey
          value: kubernetes.io/hostname

  - it: should propagate affinity
    set:
      servers:
        - name: test
          certificate:
            certname: puppet
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    topologyKey: kubernetes.io/hostname
    asserts:
      - equal:
          path: spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].weight
          value: 100
