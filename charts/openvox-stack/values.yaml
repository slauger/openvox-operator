# nameOverride: ""
# fullnameOverride: ""

config:
  name: ""             # default: Release name
  readOnlyRootFilesystem: false
  image:
    repository: ghcr.io/slauger/openvox-server
    tag: latest
    pullPolicy: Always
  puppetdb:
    serverUrls: []
  puppet:
    environmentTimeout: ""
    storeconfigs: false
    reports: store
  code:
    image: ""
    imagePullPolicy: IfNotPresent
    imagePullSecret: ""
    claimName: ""

ca:
  name: ""             # default: {fullname}-ca
  ttl: 5y
  storage:
    size: 1Gi
    storageClass: ""

reportProcessors: []
# reportProcessors:
#   - name: my-webhook
#     url: http://my-webhook:8080/reports
#   - name: my-puppetdb
#     url: http://my-puppetdb:8080/pdb/cmd/v1
#     processor: puppetdb

signingPolicies: []
# signingPolicies:
#   - name: autosign-any
#     any: true
#   - name: preshared-key
#     csrAttributes:
#       - name: pp_preshared_key
#         value: "my-secret-token"

nodeClassifier:
  enabled: false
  name: ""             # default: {fullname}-enc
  url: ""
  request:
    method: GET
    path: /node/{certname}
    body: ""
  response:
    format: yaml
  timeoutSeconds: 10
  auth:
    mtls: false
  cache:
    enabled: false
    directory: /var/cache/openvox-enc

database:
  enabled: false
  name: ""              # REQUIRED when enabled (no auto-default)
  image:
    repository: ghcr.io/slauger/openvox-db
    tag: latest
    pullPolicy: IfNotPresent
  certificate:
    certname: ""        # REQUIRED when enabled
    dnsAltNames: []
  postgres:
    host: ""            # REQUIRED when enabled
    port: 5432
    database: openvoxdb
    credentialsSecretRef: ""  # REQUIRED when enabled
    sslMode: require
  replicas: 1
  javaArgs: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

servers:
  - name: ca
    ca: true
    server: true
    poolRefs: [ca, server]
    certificate:
      certname: puppet
      dnsAltNames: []
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 2Gi
  - name: server
    ca: false
    server: true
    poolRefs: [server]
    certificate:
      certname: server
      dnsAltNames: []
    replicas: 2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 2Gi

gateway:
  name: ""              # shared Gateway resource name
  sectionName: ""       # listener name on the Gateway

pools:
  - name: ca
    service:
      type: ClusterIP
      port: 8140
    # route:
    #   enabled: false
    #   hostname: ""
    #   injectDNSAltName: false
  - name: server
    service:
      type: ClusterIP
      port: 8140
    # route:
    #   enabled: false
    #   hostname: ""
    #   injectDNSAltName: false
