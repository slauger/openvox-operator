  #   borrowTimeout: 1200000
  #   compileMode: "off"
  #   clientAuth: want
  #   httpClient:
  #     connectTimeoutMs: 120000
  #     idleTimeoutMs: 120000
  #   authorizationRules: []
  # logging:
  #   level: INFO
  #   loggers:
  #     puppetlabs.puppetserver: DEBUG
  # metrics:
  #   enabled: true
  #   jmx:
  #     enabled: true
  #   graphite:
  #     enabled: true
  #     host: graphite.example.com
  #     port: 2003

ca:
  name: ""             # default: {fullname}-ca
  ttl: 5y
  # allowSubjectAltNames: true
  # allowAuthorizationExtensions: true
  # enableInfraCRL: true
  # allowAutoRenewal: true
  # autoRenewalCertTTL: 90d
  # crlRefreshInterval: 5m
  storage:
    size: 1Gi
    storageClass: ""
  # resources:
  #   requests:
  #     cpu: 200m
  #     memory: 768Mi
  #   limits:
  #     memory: 1Gi
  # intermediateCA:
  #   enabled: true
  #   secretName: my-intermediate-ca
  # external:
  #   url: https://ca.example.com

reportProcessors: []
# reportProcessors:
#   - name: my-webhook
#     url: http://my-webhook:8080/reports
#   - name: my-puppetdb
#     url: http://my-puppetdb:8080/pdb/cmd/v1
#     processor: puppetdb

signingPolicies: []
# signingPolicies:
#   - name: autosign-any
#     any: true
#   - name: preshared-key
#     csrAttributes:
#       - name: pp_preshared_key
#         value: "my-secret-token"

nodeClassifier:
  enabled: false
  name: ""             # default: {fullname}-enc
  url: ""
  request:
    method: GET
    path: /node/{certname}
    body: ""
  response:
    format: yaml
  timeoutSeconds: 10
  auth:
    mtls: false
  cache:
    enabled: false
    directory: /var/cache/openvox-enc

database:
  enabled: false
  name: ""              # REQUIRED when enabled (no auto-default)
  image:
    repository: ghcr.io/slauger/openvox-db
    tag: latest
    pullPolicy: IfNotPresent
  certificate:
    certname: ""        # REQUIRED when enabled
    dnsAltNames: []
  postgres:
    host: ""            # REQUIRED when enabled
    port: 5432
    database: openvoxdb
    credentialsSecretRef: ""  # REQUIRED when enabled
    sslMode: require
  replicas: 1
  javaArgs: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  # pdb:
  #   minAvailable: 1
  # networkPolicy:
  #   enabled: true
  # service:
  #   type: ClusterIP
  #   port: 8081

servers:
  - name: ca
    ca: true
    server: true
    poolRefs: [ca, server]
    certificate:
      certname: puppet
      dnsAltNames: []
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 2Gi
  - name: server
    ca: false
    server: true
    poolRefs: [server]
    certificate:
      certname: server
      dnsAltNames: []
    replicas: 2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 2Gi
    # javaArgs: "-Xms512m -Xmx1024m"
    # maxActiveInstances: 2
    # image:
    #   repository: ghcr.io/slauger/openvox-server
    #   tag: custom
    # code:
    #   image: ghcr.io/slauger/openvox-code:latest
    # autoscaling:
    #   minReplicas: 2
    #   maxReplicas: 5
    #   targetCPUUtilizationPercentage: 80
    # pdb:
    #   minAvailable: 1
    # networkPolicy:
    #   enabled: true
    # topologySpreadConstraints:
    #   - maxSkew: 1
    #     topologyKey: kubernetes.io/hostname
    #     whenUnsatisfiable: DoNotSchedule
    # affinity:
    #   podAntiAffinity:
    #     preferredDuringSchedulingIgnoredDuringExecution:
    #       - weight: 100
    #         podAffinityTerm:
    #           topologyKey: kubernetes.io/hostname

gateway:
  name: ""              # shared Gateway resource name
  sectionName: ""       # listener name on the Gateway

pools:
  - name: ca
    service:
      type: ClusterIP
      port: 8140
    # route:
    #   enabled: false
    #   hostname: ""
    #   injectDNSAltName: false
  - name: server
    service:
      type: ClusterIP
      port: 8140
    # route:
