# nameOverride: ""
# fullnameOverride: ""

config:
  name: ""             # default: Release name
  image:
    repository: ghcr.io/slauger/openvox-server
    tag: latest
    pullPolicy: Always
  puppetdb:
    serverUrls: []
  puppet:
    environmentTimeout: unlimited
    storeconfigs: false
    reports: store
  code:
    image: ""
    imagePullPolicy: IfNotPresent
    imagePullSecret: ""
    claimName: ""

ca:
  name: ""             # default: {fullname}-ca
  ttl: 5y
  storage:
    size: 1Gi
    storageClass: ""

reportProcessors: []
# reportProcessors:
#   - name: my-webhook
#     url: http://my-webhook:8080/reports
#   - name: my-puppetdb
#     url: http://my-puppetdb:8080/pdb/cmd/v1
#     processor: puppetdb

signingPolicies: []
# signingPolicies:
#   - name: autosign-any
#     any: true
#   - name: preshared-key
#     csrAttributes:
#       - name: pp_preshared_key
#         value: "my-secret-token"

nodeClassifier:
  enabled: false
  name: ""             # default: {fullname}-enc
  url: ""
  request:
    method: GET
    path: /node/{certname}
    body: ""
  response:
    format: yaml
  timeoutSeconds: 10
  auth:
    mtls: false
  cache:
    enabled: false
    directory: /var/cache/openvox-enc

servers:
  - name: ca
    ca: true
    server: true
    poolRefs: [ca, server]
    certificate:
      certname: puppet
      dnsAltNames: []
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 2Gi

gateway:
  name: ""              # shared Gateway resource name
  sectionName: ""       # listener name on the Gateway

pools:
  - name: ca
    service:
      type: ClusterIP
      port: 8140
    # route:
    #   enabled: false
    #   hostname: ""
    #   injectDNSAltName: false
  - name: server
    service:
      type: ClusterIP
      port: 8140
    # route:
    #   enabled: false
    #   hostname: ""
    #   injectDNSAltName: false
