config:
  name: ""             # default: Release name
  readOnlyRootFilesystem: false
  image:
    repository: ghcr.io/slauger/openvox-server
    tag: latest
    pullPolicy: Always
    pullSecrets: []
    # pullSecrets:
    #   - name: my-registry-secret
  puppetdb:
    serverUrls: []
  puppet:
    environmentTimeout: ""
    environmentPath: ""
    hieraConfig: ""
    storeconfigs: false
    storeBackend: ""
    reports: store
    extraConfig: {}
    # extraConfig:
    #   strict_variables: "true"
    #   parser: future
  code:
    image: ""
    imagePullPolicy: IfNotPresent
    imagePullSecret: ""
    claimName: ""
