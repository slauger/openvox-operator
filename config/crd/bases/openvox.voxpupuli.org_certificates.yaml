---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: certificates.openvox.voxpupuli.org
spec:
  group: openvox.voxpupuli.org
  names:
    kind: Certificate
    listKind: CertificateList
    plural: certificates
    shortNames:
    - cert
    singular: certificate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.authorityRef
      name: Authority
      type: string
    - jsonPath: .spec.certname
      name: Certname
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.notAfter
      name: NotAfter
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Certificate is the Schema for the certificates API.
          It manages the lifecycle of a single certificate signed by a CertificateAuthority.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CertificateSpec defines the desired state of Certificate.
            properties:
              authorityRef:
                description: AuthorityRef references the CertificateAuthority that
                  signs this certificate.
                type: string
              certname:
                default: puppet
                description: Certname is the certificate common name.
                type: string
              csrExtensions:
                description: CSRExtensions defines Puppet CSR extension attributes
                  to embed in the CSR.
                properties:
                  customExtensions:
                    additionalProperties:
                      type: string
                    description: |-
                      CustomExtensions allows arbitrary pp_* extensions as name/value pairs.
                      Keys must be known Puppet extension names (e.g. pp_cost_center, pp_department).
                    type: object
                  ppCliAuth:
                    description: PpCliAuth adds the pp_cli_auth extension, granting
                      CA API signing rights.
                    type: boolean
                  ppEnvironment:
                    description: PpEnvironment sets the pp_environment extension value.
                    type: string
                  ppRole:
                    description: PpRole sets the pp_role extension value.
                    type: string
                type: object
              dnsAltNames:
                description: DNSAltNames is a list of DNS subject alternative names
                  for the certificate.
                items:
                  type: string
                type: array
              renewBefore:
                default: 60d
                description: |-
                  RenewBefore is the duration before expiration when the certificate should be renewed.
                  Uses duration format: "60d", "30d", "720h".
                pattern: ^\d+[smhdy]$
                type: string
            required:
            - authorityRef
            type: object
          status:
            description: CertificateStatus defines the observed state of Certificate.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              notAfter:
                description: NotAfter is the expiration time of the signed certificate.
                format: date-time
                type: string
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Pending
                - Requesting
                - WaitingForSigning
                - Signed
                - Renewing
                - Error
                type: string
              secretName:
                description: SecretName is the name of the Secret containing cert.pem
                  and key.pem.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
