---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: configs.openvox.voxpupuli.org
spec:
  group: openvox.voxpupuli.org
  names:
    kind: Config
    listKind: ConfigList
    plural: configs
    shortNames:
    - cfg
    singular: config
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.authorityRef
      name: CA
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Config is the Schema for the configs API.
          It manages shared configuration (puppet.conf, auth.conf) and PuppetDB connection.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConfigSpec defines the desired state of Config.
            properties:
              authorityRef:
                description: AuthorityRef references the CertificateAuthority used
                  by this Config.
                type: string
              code:
                description: |-
                  Code defines the Puppet code source for all Servers in this Config.
                  Only applied to Servers with server=true.
                properties:
                  claimName:
                    description: |-
                      ClaimName references an existing PVC containing Puppet code.
                      Mutually exclusive with Image.
                    type: string
                  image:
                    description: |-
                      Image is an OCI image reference containing Puppet code.
                      Mounted as a read-only image volume (requires Kubernetes 1.31+).
                      Mutually exclusive with ClaimName.
                    type: string
                  imagePullPolicy:
                    default: IfNotPresent
                    description: ImagePullPolicy defines when to pull the code image.
                    type: string
                  imagePullSecret:
                    description: ImagePullSecret references a Secret for pulling from
                      private registries.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: image and claimName are mutually exclusive
                  rule: '!(has(self.image) && size(self.image) > 0 && has(self.claimName)
                    && size(self.claimName) > 0)'
                - message: either image or claimName must be set
                  rule: (has(self.image) && size(self.image) > 0) || (has(self.claimName)
                    && size(self.claimName) > 0)
              image:
                description: Image defines the default container image for all Servers
                  in this Config.
                properties:
                  pullPolicy:
                    default: IfNotPresent
                    description: PullPolicy defines the image pull policy.
                    type: string
                  pullSecrets:
                    description: PullSecrets is a list of image pull secrets.
                    items:
                      description: |-
                        LocalObjectReference contains enough information to let you locate the
                        referenced object inside the same namespace.
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    type: array
                  repository:
                    default: ghcr.io/slauger/openvox-server
                    description: Repository is the container image repository.
                    type: string
                  tag:
                    default: latest
                    description: Tag is the container image tag.
                    type: string
                type: object
              logging:
                description: Logging defines logback.xml settings for Puppet Server
                  logging.
                properties:
                  level:
                    default: INFO
                    description: Level is the root log level.
                    enum:
                    - TRACE
                    - DEBUG
                    - INFO
                    - WARN
                    - ERROR
                    type: string
                  loggers:
                    additionalProperties:
                      type: string
                    description: |-
                      Loggers defines per-logger level overrides.
                      Keys are logger names, values are log levels (TRACE, DEBUG, INFO, WARN, ERROR).
                    type: object
                type: object
              metrics:
                description: Metrics defines metrics.conf settings for Puppet Server
                  metrics.
                properties:
                  enabled:
                    default: false
                    description: Enabled activates Puppet Server metrics.
                    type: boolean
                  graphite:
                    description: Graphite configures Graphite metrics reporting.
                    properties:
                      enabled:
                        default: false
                        description: Enabled activates Graphite reporting.
                        type: boolean
                      host:
                        description: Host is the Graphite server hostname.
                        type: string
                      port:
                        default: 2003
                        description: Port is the Graphite server port.
                        format: int32
                        type: integer
                      updateIntervalSeconds:
                        default: 60
                        description: UpdateIntervalSeconds is the interval between
                          metric reports.
                        format: int32
                        type: integer
                    type: object
                  jmx:
                    description: JMX configures JMX metrics reporting.
                    properties:
                      enabled:
                        default: false
                        description: Enabled activates JMX metrics.
                        type: boolean
                    type: object
                type: object
              nodeClassifierRef:
                description: NodeClassifierRef references the NodeClassifier used
                  by this Config.
                type: string
              puppet:
                description: Puppet defines shared puppet.conf settings.
                properties:
                  environmentPath:
                    default: /etc/puppetlabs/code/environments
                    description: EnvironmentPath is the path to puppet environments.
                    type: string
                  environmentTimeout:
                    default: unlimited
                    description: EnvironmentTimeout controls how long puppet caches
                      environments.
                    type: string
                  extraConfig:
                    additionalProperties:
                      type: string
                    description: ExtraConfig is a map of additional puppet.conf entries.
                    type: object
                  hieraConfig:
                    default: $confdir/hiera.yaml
                    description: HieraConfig is the path to the hiera configuration.
                    type: string
                  reports:
                    default: puppetdb
                    description: Reports defines which report processors to use.
                    type: string
                  storeBackend:
                    default: puppetdb
                    description: StoreBackend is the storeconfigs backend.
                    type: string
                  storeconfigs:
                    default: true
                    description: Storeconfigs enables storeconfigs.
                    type: boolean
                type: object
              puppetdb:
                description: PuppetDB defines the PuppetDB connection settings.
                properties:
                  serverUrls:
                    description: ServerURLs is a list of PuppetDB server URLs.
                    items:
                      type: string
                    type: array
                type: object
              puppetserver:
                description: PuppetServer defines puppetserver.conf, webserver.conf
                  and auth.conf settings.
                properties:
                  authorizationRules:
                    description: AuthorizationRules defines custom authorization rules
                      inserted before the deny-all rule.
                    items:
                      description: AuthorizationRule defines a custom auth.conf rule.
                      properties:
                        allow:
                          description: Allow specifies which clients are allowed.
                            Use "*" for all authenticated clients.
                          type: string
                        allowUnauthenticated:
                          description: AllowUnauthenticated allows unauthenticated
                            access when true.
                          type: boolean
                        deny:
                          description: Deny specifies which clients are denied. Use
                            "*" for all clients.
                          type: string
                        matchRequest:
                          description: MatchRequest defines the request matching criteria.
                          properties:
                            method:
                              description: Method is the list of HTTP methods to match.
                              items:
                                type: string
                              type: array
                            path:
                              description: Path is the URL path or pattern to match.
                              type: string
                            type:
                              default: path
                              description: Type is the match type.
                              enum:
                              - path
                              - regex
                              type: string
                          required:
                          - path
                          type: object
                        name:
                          description: Name is a descriptive name for the rule.
                          type: string
                        sortOrder:
                          default: 500
                          description: SortOrder controls rule evaluation order (lower
                            = earlier).
                          format: int32
                          type: integer
                      required:
                      - matchRequest
                      - name
                      type: object
                    type: array
                  borrowTimeout:
                    default: 1200000
                    description: BorrowTimeout is the timeout in milliseconds for
                      borrowing a JRuby instance from the pool.
                    format: int32
                    type: integer
                  clientAuth:
                    default: want
                    description: ClientAuth controls SSL client authentication mode
                      for the webserver.
                    enum:
                    - want
                    - need
                    - none
                    type: string
                  compileMode:
                    default: "off"
                    description: CompileMode controls JRuby compilation mode.
                    enum:
                    - jit
                    - "off"
                    type: string
                  httpClient:
                    description: HTTPClient defines HTTP client settings for outgoing
                      connections.
                    properties:
                      connectTimeoutMs:
                        description: ConnectTimeoutMs is the connection timeout in
                          milliseconds.
                        format: int32
                        type: integer
                      idleTimeoutMs:
                        description: IdleTimeoutMs is the idle timeout in milliseconds.
                        format: int32
                        type: integer
                    type: object
                  maxRequestsPerInstance:
                    default: 0
                    description: |-
                      MaxRequestsPerInstance is the max number of requests per JRuby instance before it is restarted.
                      0 means unlimited (no restart).
                    format: int32
                    type: integer
                type: object
            required:
            - image
            type: object
          status:
            description: ConfigStatus defines the observed state of Config.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Pending
                - Running
                - Error
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
