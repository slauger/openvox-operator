---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: pools.openvox.voxpupuli.org
spec:
  group: openvox.voxpupuli.org
  names:
    kind: Pool
    listKind: PoolList
    plural: pools
    singular: pool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.configRef
      name: Config
      type: string
    - jsonPath: .spec.service.type
      name: Type
      type: string
    - jsonPath: .status.endpoints
      name: Endpoints
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Pool is the Schema for the pools API.
          It owns a Kubernetes Service that selects Server Pods matching the Pool's Selector.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PoolSpec defines the desired state of Pool.
            properties:
              configRef:
                description: ConfigRef references the Config this Pool belongs to.
                type: string
              route:
                description: Route configures external access via Gateway API TLSRoute.
                properties:
                  enabled:
                    default: false
                    description: Enabled activates TLSRoute creation for this Pool.
                    type: boolean
                  gatewayRef:
                    description: GatewayRef references the Gateway to attach the TLSRoute
                      to.
                    properties:
                      name:
                        description: Name of the Gateway.
                        type: string
                      sectionName:
                        description: SectionName of the Gateway listener.
                        type: string
                    required:
                    - name
                    type: object
                  hostname:
                    description: Hostname is the SNI hostname (e.g. "production.puppet.example.com").
                    type: string
                  injectDNSAltName:
                    default: false
                    description: |-
                      InjectDNSAltName automatically adds the hostname to the Certificate's dnsAltNames
                      of all Servers selected by this Pool.
                    type: boolean
                required:
                - enabled
                type: object
                x-kubernetes-validations:
                - message: hostname is required when route is enabled
                  rule: '!self.enabled || size(self.hostname) > 0'
                - message: gatewayRef.name is required when route is enabled
                  rule: '!self.enabled || size(self.gatewayRef.name) > 0'
              selector:
                additionalProperties:
                  type: string
                description: |-
                  Selector is a set of labels used to select Server Pods for this Pool's Service.
                  The config label is always added automatically.
                  If empty or nil, the Pool selects all Server Pods in the Config.
                type: object
              service:
                description: Service defines the Kubernetes Service configuration.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations are additional annotations for the Service.
                    type: object
                  externalIPs:
                    description: |-
                      ExternalIPs is a list of IP addresses for which nodes in the cluster
                      will also accept traffic for this service.
                    items:
                      type: string
                    type: array
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels are additional labels for the Service.
                    type: object
                  nodePort:
                    description: |-
                      NodePort is the port on each node for type NodePort or LoadBalancer.
                      If unset, Kubernetes auto-assigns a port from the node port range.
                    format: int32
                    type: integer
                  port:
                    default: 8140
                    description: Port is the Service port.
                    format: int32
                    type: integer
                  type:
                    default: ClusterIP
                    description: Type is the Service type (ClusterIP, LoadBalancer,
                      NodePort).
                    type: string
                type: object
            required:
            - configRef
            type: object
          status:
            description: PoolStatus defines the observed state of Pool.
            properties:
              endpoints:
                description: Endpoints is the number of Pods behind the Service.
                format: int32
                type: integer
              serviceName:
                description: ServiceName is the name of the created Kubernetes Service.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
