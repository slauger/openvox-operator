apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openvox-operator
rules:
  # CRDs
  - apiGroups: ["openvox.voxpupuli.org"]
    resources: ["configs", "pools", "servers", "certificateauthorities", "certificates", "signingpolicies", "nodeclassifiers", "reportprocessors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["openvox.voxpupuli.org"]
    resources: ["configs/status", "pools/status", "servers/status", "certificateauthorities/status", "certificates/status", "signingpolicies/status", "nodeclassifiers/status", "reportprocessors/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["openvox.voxpupuli.org"]
    resources: ["configs/finalizers", "pools/finalizers", "servers/finalizers", "certificateauthorities/finalizers", "certificates/finalizers"]
    verbs: ["update"]
  # Core resources
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "serviceaccounts", "persistentvolumeclaims", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC for CA setup job ServiceAccount
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Apps
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Batch
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Policy (PodDisruptionBudgets)
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Gateway API
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["tlsroutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
