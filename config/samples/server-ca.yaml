---
apiVersion: openvox.voxpupuli.org/v1alpha1
kind: Server
metadata:
  name: production-server
  namespace: openvox-system
spec:
  configRef: production
  certificateRef: ca-cert
  ca: true
  server: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  # javaArgs is auto-calculated from memory limits (Xms=Xmx=90%)
  # With 2Gi limit: -Xms1843m -Xmx1843m
  # Override explicitly if needed:
  # javaArgs: "-Xms512m -Xmx1536m"
