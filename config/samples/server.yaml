---
apiVersion: openvox.voxpupuli.org/v1alpha1
kind: Server
metadata:
  name: stable
  namespace: openvox-system
spec:
  configRef: production
  certificateRef: stable-cert
  replicas: 2
  maxActiveInstances: 2
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 4Gi
  # javaArgs is auto-calculated from memory limits (Xms=Xmx=90%)
  # With 4Gi limit: -Xms3686m -Xmx3686m
