site_name: OpenVox Operator
site_description: A Kubernetes Operator for running OpenVox Server environments on Kubernetes and OpenShift
site_url: https://slauger.github.io/openvox-operator
repo_url: https://github.com/slauger/openvox-operator
repo_name: slauger/openvox-operator

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Kubernetes-Native Design: concepts/kubernetes-native.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Examples:
      - Overview: examples/index.md
  - Reference:
      - Overview: reference/index.md
      - Environment: reference/environment.md
      - CertificateAuthority: reference/certificateauthority.md
      - Certificate: reference/certificate.md
      - Server: reference/server.md
      - Pool: reference/pool.md
