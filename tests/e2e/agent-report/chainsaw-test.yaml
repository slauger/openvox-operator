apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: agent-report
spec:
  namespace: e2e-agent-report
  steps:
    - name: Deploy mock server
      try:
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: openvox-mock
                namespace: e2e-agent-report
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: openvox-mock
                template:
                  metadata:
                    labels:
                      app: openvox-mock
                  spec:
                    containers:
                      - name: mock
                        image: openvox-mock:latest
                        imagePullPolicy: Never
                        ports:
                          - containerPort: 8080
                        readinessProbe:
                          httpGet:
                            path: /healthz
                            port: 8080
                          periodSeconds: 5
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: openvox-mock
                namespace: e2e-agent-report
              spec:
                selector:
                  app: openvox-mock
                ports:
                  - port: 8080
                    targetPort: 8080
        - script:
            timeout: 2m
            content: |
              kubectl wait --for=condition=Available deployment/openvox-mock \
                -n e2e-agent-report --timeout=2m

    - name: Install openvox-stack with report processors
      try:
        - script:
            timeout: 2m
            content: |
              REPO_ROOT=$(git rev-parse --show-toplevel)
              LOCAL_TAG=$(git describe --always)
              helm upgrade --install e2e-agent-report "${REPO_ROOT}/charts/openvox-stack" \
                --namespace e2e-agent-report --create-namespace \
                --values "${REPO_ROOT}/charts/openvox-stack/ci/agent-report-values.yaml" \
                --set config.image.repository=openvox-server \
                --set config.image.tag="${LOCAL_TAG}" \
                --set config.image.pullPolicy=Never
      catch:
        - events: {}

    - name: Assert Server is Running
      try:
        - assert:
            resource:
              apiVersion: openvox.voxpupuli.org/v1alpha1
              kind: Server
              metadata:
                name: e2e-agent-report-ca
              status:
                phase: Running
                ready: 1
                desired: 1

    - name: Run Puppet agent
      try:
        - apply:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: puppet-agent-report
                namespace: e2e-agent-report
              spec:
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: puppet-agent
                        image: openvox-agent:latest
                        imagePullPolicy: Never
                        command: ["sh", "-c"]
                        args:
                          - |
                            puppet agent --test \
                              --server e2e-agent-report-server \
                              --waitforcert 30 \
                              --certname agent-report-test;
                            EXIT=$?;
                            if [ $EXIT -eq 0 ] || [ $EXIT -eq 2 ]; then exit 0; else exit $EXIT; fi
                        securityContext:
                          runAsUser: 0
        - assert:
            timeout: 5m
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: puppet-agent-report
                namespace: e2e-agent-report
              status:
                conditions:
                  - type: Complete
                    status: "True"

    - name: Wait for report forwarding
      try:
        - script:
            timeout: 60s
            content: |
              sleep 10

    - name: Verify mock received reports and PDB commands
      try:
        - script:
            timeout: 30s
            content: |
              REPORTS=$(kubectl exec -n e2e-agent-report deploy/openvox-mock -- \
                wget -qO- http://localhost:8080/api/reports)
              echo "Reports: ${REPORTS}"
              if [ "${REPORTS}" = "null" ] || [ "${REPORTS}" = "[]" ]; then
                echo "ERROR: Mock did not receive any reports."
                exit 1
              fi
              echo "Mock received report(s)."

              PDB=$(kubectl exec -n e2e-agent-report deploy/openvox-mock -- \
                wget -qO- http://localhost:8080/api/pdb-commands)
              echo "PDB Commands: ${PDB}"
              if [ "${PDB}" = "null" ] || [ "${PDB}" = "[]" ]; then
                echo "ERROR: Mock did not receive any PDB commands."
                exit 1
              fi
              echo "Mock received PDB command(s)."
      finally:
        - script:
            timeout: 2m
            content: |
              kubectl logs -n e2e-agent-report job/puppet-agent-report || true
              kubectl logs -n e2e-agent-report deploy/openvox-mock || true
              helm uninstall e2e-agent-report --namespace e2e-agent-report --wait 2>/dev/null || true
              kubectl delete namespace e2e-agent-report --ignore-not-found 2>/dev/null || true
